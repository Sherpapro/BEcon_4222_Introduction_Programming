format:
  revealjs:
    template-partials:
      - assets/style/title-slide.html
    width: 1280
    height: 720
    smaller: true
    embed-resources: true
    self-contained: true
    slide-number: c
    theme: assets/style/hsgtheme.scss
    highlight-style: dracula
    code-line-numbers: false

  html:
    theme:
      - cosmo
    toc: true
    toc-location: right
    code-line-numbers: false
    #highlight-style: dracula
